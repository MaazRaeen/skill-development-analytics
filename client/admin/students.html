<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management | ABC University</title>
    <link rel="stylesheet" href="../shared/styles.css">
    <link rel="stylesheet" href="admin.css">
    <link rel="stylesheet" href="student-profile.css">
</head>
<body>
    <div class="app-wrapper">
        <!-- Unified Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-logo">ABC Analytics</div>
            <nav>
                <a href="/" class="sidebar-link"><span>🏠</span> Home Portal</a>
                <a href="/admin/index.html" class="sidebar-link"><span>📈</span> Analytics Hub</a>
                <a href="/admin/students.html" class="sidebar-link active"><span>👥</span> Student Directory</a>
                <a href="/student/index.html" class="sidebar-link"><span>👤</span> Personal Records</a>
                <a href="#" class="sidebar-link"><span>📋</span> Admissions</a>
            </nav>
        </aside>

        <!-- Main Workspace -->
        <div class="main-container">
            <header class="top-header">
                <div class="search-bar">
                    <span>🔍</span>
                    <input type="text" id="globalSearch" placeholder="Filter by name, ID, or department...">
                </div>
                <div style="display: flex; align-items: center; gap: 2rem;">
                    <select id="deptFilter" style="background: var(--bg-main); border: 1px solid var(--border); padding: 8px 16px; border-radius: 12px; font-weight: 700;">
                        <option value="all">All Departments</option>
                    </select>
                    <img src="https://images.unsplash.com/photo-1472099645785-5658abf4ff4e?w=32&h=32&fit=crop" class="user-avatar" alt="User">
                </div>
            </header>

            <main class="main-content">
                <div class="flex-between mb-1">
                    <h1 style="font-size: 1.8rem; font-weight: 800;">Academic Records Management</h1>
                    <span id="studentCount" class="badge" style="background: var(--primary); color: white;">125 TOTAL STUDENTS</span>
                </div>

                <div class="table-container card">
                    <table>
                        <thead>
                            <tr>
                                <th>Student Identity</th>
                                <th>Department</th>
                                <th>Cumulative GPA</th>
                                <th>Performance Action</th>
                            </tr>
                        </thead>
                        <tbody id="studentTableBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </main>
        </div>
    </div>

    <!-- Student Profile Modal (Legacy but kept for backup if needed, though we redirect now) -->
    <div id="profileModal" class="modal">
        <div class="modal-content profile-modal animate-fade">
            <button class="close-btn" onclick="document.getElementById('profileModal').style.display='none'">&times;</button>
            <div id="modalBody"></div>
        </div>
    </div>

    <script type="module" src="students.js"></script>
</body>
</html>
